#!/bin/bash
# A/B test: io500-style IOR flags vs vanilla, on the same b=16g ppn=16 shared workload.
# Comparison goal: does -C -Q 1 -g -G + dataPacketType=timestamp + stoneWallingWearOut=1
# explain the io500 ppn=16 throughput collapse vs direct IOR's 106 GiB/s?
#
# NOTE: dataPacketType / stoneWallingWearOut flow through IOR's -O ; -Q / -C / -g are bare flags.
# We run TWO IOR commands per job: one io500-style, one vanilla.

transfer_size_list=(4m)
block_size_list=(16g)
ppn_list=(16)

ior_flags_list=(
  # Vanilla baseline (matches the 106 GiB/s 5/9 run)
  "-w -r"
  # io500-style on direct IOR. dataPacketType is set via -O, no -F => shared file.
  "-w -r -C -Q 1 -g -G 271 -O stoneWallingWearOut=1 -O dataPacketType=timestamp"
)

server_ppn_list=(1)
benchfs_chunk_size_list=(4m)

CHFS_CHUNK_SIZE=4194304
CHFS_PROTOCOL="verbs"
CHFS_DB_SIZE="10GB"
