#!/bin/bash
# Compare direct BenchFS IOR with io500's best config to isolate
# whether the read-bandwidth gap (~10x slower than 16-node debug_large)
# is due to io500 overhead or the BenchFS configuration itself.

# Match io500's chosen-best config: t=4m, b=4g, ppn=4, shared file, chunk=4MiB.
transfer_size_list=(4m)
block_size_list=(4g)
ppn_list=(4 16)              # Try both ppn to compare against direct's ppn=16

ior_flags_list=(
  "-w -r"        # Shared file (matches io500 fpp=FALSE)
  "-w -r -F"     # File-per-proc (matches io500 fpp=TRUE / direct's debug_large)
)

server_ppn_list=(1)
benchfs_chunk_size_list=(4m)

# CHFS knobs (unused for benchfs)
CHFS_CHUNK_SIZE=4194304
CHFS_PROTOCOL="verbs"
CHFS_DB_SIZE="10GB"
